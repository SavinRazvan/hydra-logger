hydra_config_schema_version: 1
default_level: INFO
layers:
  ship:
    level: INFO
    destinations:
      - type: network_http
        url: https://httpbin.org/post
        timeout: 5.0
        retry_count: 3
        retry_delay: 0.5
        connection_probe: true
        probe_method: HEAD
        http_batch_size: 50
