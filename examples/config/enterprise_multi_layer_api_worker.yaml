hydra_config_schema_version: 1
default_level: INFO
strict_reliability_mode: true
reliability_error_policy: warn
enforce_log_path_confinement: true
allow_absolute_log_paths: false
base_log_dir: examples/logs
log_dir_name: tutorials
layers:
  api:
    level: INFO
    destinations:
      - type: console
        format: colored
      - type: file
        path: api
        format: json-lines
  worker:
    level: INFO
    destinations:
      - type: file
        path: worker
        format: json-lines
