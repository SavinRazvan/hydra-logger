name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MYPY_ENFORCE: "true"
  BANDIT_ENFORCE: "true"
  PIP_AUDIT_ENFORCE: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12, 3.13]
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v5.0.3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('setup.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install -e ".[database,cloud,queues,network]"

    - name: Enforce version consistency
      run: |
        python scripts/dev/check_version_consistency.py
    
    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=hydra_logger --cov-report=xml --cov-report=term-missing --cov-fail-under=95

    - name: Enforce repository logs isolation
      run: |
        python scripts/dev/check_logs_clean.py

    - name: Enforce benchmark package coverage
      if: matrix.python-version == '3.12'
      run: |
        pytest tests/benchmark --cov=benchmark --cov-report=term-missing --cov-fail-under=95

    - name: Enforce critical module coverage floors
      if: matrix.python-version == '3.12'
      run: |
        pytest tests/handlers tests/loggers tests/extensions \
          --cov=hydra_logger.handlers \
          --cov=hydra_logger.loggers \
          --cov=hydra_logger.extensions \
          --cov-report=term-missing \
          --cov-fail-under=95
    
    - name: Upload coverage to Codecov
      if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      uses: codecov/codecov-action@v5.5.2
      with:
        token: ${{ env.CODECOV_TOKEN }}
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install -e ".[database,cloud,queues,network]"

    - name: Enforce slim-header standard
      run: |
        python scripts/pr/check_slim_headers.py --all-python --strict
    
    - name: Run flake8
      run: |
        flake8 hydra_logger/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 hydra_logger/ tests/ --count --max-line-length=88 --extend-ignore=E203,W503,E501 --statistics
        flake8 hydra_logger/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=88 --extend-ignore=E203,W503,E501 --statistics
    
    - name: Run black
      run: |
        black --check --diff hydra_logger/ tests/

    - name: Run isort
      run: |
        isort --check-only --diff hydra_logger/ tests/
    
    - name: Run mypy
      run: |
        mypy hydra_logger/ > mypy-report.txt 2>&1 || true
        cat mypy-report.txt
        if [ "${MYPY_ENFORCE}" = "true" ]; then
          mypy hydra_logger/
        fi

    - name: Upload mypy report
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: mypy-report
        path: mypy-report.txt

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" build twine
        pip install -e ".[database,cloud,queues,network]"
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package
      run: |
        twine check dist/*

    - name: Verify distribution contents
      run: |
        python scripts/release/verify_dist_contents.py
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7.0.0
      with:
        name: dist
        path: dist/

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pip-audit
        pip install -e ".[database,cloud,queues,network]"
    
    - name: Run bandit security scan
      run: |
        bandit -r hydra_logger/ -f json -o bandit-report.json || true

    - name: Enforce bandit high-severity gate
      run: |
        bandit -r hydra_logger/ --severity-level high --confidence-level high > bandit-high.txt 2>&1 || true
        cat bandit-high.txt
        if [ "${BANDIT_ENFORCE}" = "true" ]; then
          bandit -r hydra_logger/ --severity-level high --confidence-level high
        fi
    
    - name: Run pip-audit
      run: |
        pip-audit --format json --output pip-audit-report.json > pip-audit.txt 2>&1 || true
        cat pip-audit.txt
        if [ "${PIP_AUDIT_ENFORCE}" = "true" ]; then
          pip-audit
        fi
    
    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: security-reports
        path: |
          bandit-report.json
          bandit-high.txt
          pip-audit-report.json
          pip-audit.txt

  benchmark-ci-smoke:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install -e ".[database,cloud,queues,network]"

    - name: Run benchmark ci_smoke profile
      run: |
        python benchmark/performance_benchmark.py --profile ci_smoke

    - name: Upload ci_smoke benchmark artifacts
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: benchmark-ci-smoke-results
        path: |
          benchmark/results/benchmark_latest.json
          benchmark/results/benchmark_*.json
        retention-days: 7

  benchmark-pr-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install -e ".[database,cloud,queues,network]"

    - name: Run benchmark pr_gate profile
      run: |
        python benchmark/performance_benchmark.py --profile pr_gate

    - name: Upload pr_gate benchmark artifacts
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: benchmark-pr-gate-results
        path: |
          benchmark/results/benchmark_latest.json
          benchmark/results/benchmark_*.json
        retention-days: 14

